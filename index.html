<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>WorldForge</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#0f0f0f;color:#e8e4dc;font-family:'Source Sans 3',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2a2a32;border-radius:2px}
input,textarea,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script>
// === IndexedDB ===
const IDB={
  _db:null,
  open(){return new Promise((res,rej)=>{if(this._db)return res(this._db);const r=indexedDB.open('worldforge',2);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};r.onsuccess=e=>{this._db=e.target.result;res(this._db);};r.onerror=e=>rej(e);});},
  async get(k){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>res(t.result===undefined?null:t.result);t.onerror=e=>rej(e);});},
  async set(k,v){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});},
  async del(k){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});},
  async list(p){const d=await this.open();return new Promise((res,rej)=>{const ks=[];const rng=IDBKeyRange.bound(p,p+'\uffff');const t=d.transaction('kv','readonly').objectStore('kv').openCursor(rng);t.onsuccess=e=>{const c=e.target.result;if(c){ks.push(c.key);c.continue();}else res(ks);};t.onerror=e=>rej(e);});},
  async clear(){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').clear();t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});}
};

// === Config ===
window.ASPECTS=[
  {id:"characters",name:"Characters",icon:"\u{1f464}",topicType:"character",topicPrompt:"List every character name mentioned"},
  {id:"cultures",name:"Cultures",icon:"\u{1f3db}\ufe0f",topicType:"entity",topicPrompt:"List every culture or civilization mentioned"},
  {id:"history",name:"History",icon:"\u{1f4dc}",topicType:"event",topicPrompt:"List every historical event or era mentioned"},
  {id:"geography",name:"Geography",icon:"\u{1f5fa}\ufe0f",topicType:"location",topicPrompt:"List every location or landmark mentioned"},
  {id:"magic-technology",name:"Magic / Technology",icon:"\u2728",topicType:"system",topicPrompt:"List every magic system or technology mentioned"},
  {id:"politics",name:"Politics",icon:"\u2696\ufe0f",topicType:"entity",topicPrompt:"List every political entity mentioned"},
  {id:"religion-beliefs",name:"Religion & Beliefs",icon:"\u{1f56f}\ufe0f",topicType:"entity",topicPrompt:"List every religion or deity mentioned"},
  {id:"languages",name:"Languages",icon:"\u{1f524}",topicType:"entity",topicPrompt:"List every language mentioned"},
  {id:"economy",name:"Economy",icon:"\u{1f4b0}",topicType:"entity",topicPrompt:"List every economic system mentioned"},
  {id:"story-elements",name:"Story Elements",icon:"\u{1f4d6}",topicType:"entity",topicPrompt:"List every plot thread mentioned"},
  {id:"cosmology",name:"Cosmology & Creation",icon:"\u{1f30c}",topicType:"entity",topicPrompt:"List every cosmic entity mentioned"},
  {id:"flora-fauna",name:"Flora & Fauna",icon:"\u{1f33f}",topicType:"entity",topicPrompt:"List every creature or species mentioned"},
  {id:"organizations",name:"Organizations & Factions",icon:"\u{1f3f4}",topicType:"entity",topicPrompt:"List every faction mentioned"},
  {id:"calendar-time",name:"Calendar & Time",icon:"\u{1f4c5}",topicType:"entity",topicPrompt:"List every calendar or festival mentioned"},
  {id:"arts-entertainment",name:"Arts & Entertainment",icon:"\u{1f3ad}",topicType:"entity",topicPrompt:"List every art form mentioned"},
  {id:"food-cuisine",name:"Food & Cuisine",icon:"\u{1f37d}\ufe0f",topicType:"entity",topicPrompt:"List every dish or tradition mentioned"},
  {id:"fashion",name:"Fashion & Appearance",icon:"\u{1f458}",topicType:"entity",topicPrompt:"List every clothing style mentioned"},
  {id:"architecture",name:"Architecture",icon:"\u{1f3f0}",topicType:"entity",topicPrompt:"List every building or style mentioned"},
  {id:"military",name:"Military & Warfare",icon:"\u2694\ufe0f",topicType:"entity",topicPrompt:"List every army or battle mentioned"},
  {id:"transportation",name:"Transportation & Trade",icon:"\u{1f6a2}",topicType:"entity",topicPrompt:"List every trade route mentioned"},
  {id:"education",name:"Education & Knowledge",icon:"\u{1f4da}",topicType:"entity",topicPrompt:"List every school mentioned"},
  {id:"healthcare",name:"Healthcare & Medicine",icon:"\u{1f3e5}",topicType:"entity",topicPrompt:"List every medical practice mentioned"},
  {id:"notable-locations",name:"Notable Locations",icon:"\u{1f4cd}",topicType:"location",topicPrompt:"List every named place mentioned"},
];
window.MAX_WORLDS=10;

// === Data Layer ===
window.db={
  async listWorlds(){const ks=await IDB.list("world:");const ws=[];for(const k of ks){const w=await IDB.get(k);if(w)ws.push(w);}ws.sort((a,b)=>(a.created||"").localeCompare(b.created||""));return ws;},
  async createWorld(n){const id=n.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)+'-'+Math.random().toString(36).slice(2,8);const m={id,name:n,created:new Date().toISOString(),updated:new Date().toISOString(),chatCount:0};await IDB.set("world:"+id,m);await IDB.set("bible:"+id,{world_id:id,world_name:n,last_updated:new Date().toISOString(),facts:{}});return m;},
  async saveWorld(w){w.updated=new Date().toISOString();return IDB.set("world:"+w.id,w);},
  async deleteWorld(wid){await IDB.del("world:"+wid);await IDB.del("bible:"+wid);await IDB.del("mapsvg:"+wid);await IDB.del("mappack:"+wid);const ck=await IDB.list("chat:"+wid+":");for(const k of ck)await IDB.del(k);const tk=await IDB.list("topic:"+wid+":");for(const k of tk)await IDB.del(k);},
  async getBible(wid){return(await IDB.get("bible:"+wid))||{facts:{}};},
  async saveBible(wid,b){b.last_updated=new Date().toISOString();return IDB.set("bible:"+wid,b);},
  async addFact(wid,cat,key,val){const b=await this.getBible(wid);if(!b.facts)b.facts={};if(!b.facts[cat])b.facts[cat]={};b.facts[cat][key]=val;return this.saveBible(wid,b);},
  async listChats(wid,aid){const ks=await IDB.list("chat:"+wid+":"+aid+":");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createChat(wid,aid,title){const id=Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);const ch={id,world_id:wid,aspect_id:aid,title:title||("Chat "+new Date().toLocaleString()),created:new Date().toISOString(),updated:new Date().toISOString(),messages:[]};await IDB.set("chat:"+wid+":"+aid+":"+id,ch);return ch;},
  async saveChat(c){c.updated=new Date().toISOString();return IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);},
  async loadChat(wid,aid,cid){return IDB.get("chat:"+wid+":"+aid+":"+cid);},
  async listGeneralChats(){const ks=await IDB.list("chat:__general__:__general__:");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createGeneralChat(t){return this.createChat("__general__","__general__",t);},
  async fileNote(wid,aid,text){const chats=await this.listChats(wid,aid);let tgt=chats.find(c=>c.title==="Cross-World Notes");if(tgt)tgt=await this.loadChat(wid,aid,tgt.id);if(!tgt)tgt=await this.createChat(wid,aid,"Cross-World Notes");tgt.messages.push({role:"user",content:text,timestamp:new Date().toISOString(),source:"cross-world"});await this.saveChat(tgt);},
  async gatherAspectText(wid,aid){const chats=await this.listChats(wid,aid);const ts=[];for(const ch of chats){const f=await this.loadChat(wid,aid,ch.id);if(f)for(const m of f.messages||[])ts.push(m.content||"");}return ts.join("\n\n");},
  async saveTopic(t){t.updated=new Date().toISOString();if(!t.tags)t.tags=[];if(!t.timeline)t.timeline=[];await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);return t;},
  async listTopics(wid,aid){const ks=await IDB.list("topic:"+wid+":"+aid+":");const ts=[];for(const k of ks){const t=await IDB.get(k);if(t)ts.push(t);}ts.sort((a,b)=>(a.name||"").localeCompare(b.name||""));return ts;},
  async deleteTopic(wid,aid,tid){return IDB.del("topic:"+wid+":"+aid+":"+tid);},
  async countTopics(wid,aid){return(await IDB.list("topic:"+wid+":"+aid+":")).length;},
  async saveMapSvg(wid,svg){return IDB.set("mapsvg:"+wid,svg);},
  async getMapSvg(wid){return IDB.get("mapsvg:"+wid);},
  async saveMapPack(wid,p){return IDB.set("mappack:"+wid,p);},
  async getMapPack(wid){return IDB.get("mappack:"+wid);},
  async hasMap(wid){return!!(await IDB.get("mapsvg:"+wid));},
  async getProvider(){return(await IDB.get("_provider"))||"claude";},
  async setProvider(p){return IDB.set("_provider",p);},
  async getCustomEndpoint(){return(await IDB.get("_custom_endpoint"))||"";},
  async setCustomEndpoint(u){return IDB.set("_custom_endpoint",u);},
  async exportAll(){const data={version:"worldforge-v5",exported:new Date().toISOString(),worlds:[],bibles:[],chats:[],topics:[],generalChats:[],mapData:[]};const ws=await this.listWorlds();for(const w of ws){data.worlds.push(w);data.bibles.push({wid:w.id,...(await this.getBible(w.id))});for(const asp of ASPECTS){const cs=await this.listChats(w.id,asp.id);for(const ch of cs){const f=await this.loadChat(w.id,asp.id,ch.id);if(f)data.chats.push(f);}const tps=await this.listTopics(w.id,asp.id);for(const t of tps)data.topics.push(t);}const wgc=await this.listChats(w.id,"__worldchat__");for(const ch of wgc){const f=await this.loadChat(w.id,"__worldchat__",ch.id);if(f)data.chats.push(f);}const svg=await this.getMapSvg(w.id);const pk=await this.getMapPack(w.id);if(svg||pk)data.mapData.push({wid:w.id,svg:svg||null,pack:pk||null});}const gc=await this.listGeneralChats();for(const ch of gc){const f=await this.loadChat("__general__","__general__",ch.id);if(f)data.generalChats.push(f);}return data;},
  async importAll(data){let ct={worlds:0,chats:0,topics:0};for(const w of data.worlds||[]){await IDB.set("world:"+w.id,w);ct.worlds++;}for(const b of data.bibles||[]){const wid=b.wid||b.world_id;if(wid)await IDB.set("bible:"+wid,b);}for(const c of data.chats||[]){await IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);ct.chats++;}for(const c of data.generalChats||[]){await IDB.set("chat:__general__:__general__:"+c.id,c);ct.chats++;}for(const t of data.topics||[]){await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);ct.topics++;}for(const m of data.mapData||[]){if(m.svg)await this.saveMapSvg(m.wid,m.svg);if(m.pack)await this.saveMapPack(m.wid,m.pack);}return ct;},
  async getApiKey(){return IDB.get("_apikey");},
  async setApiKey(k){return IDB.set("_apikey",k);},
};

// === AI ===
window.aiCall=async function(system,messages,maxTokens){
  maxTokens=maxTokens||1500;const key=await db.getApiKey();
  if(!key)return"[No API key set. Go to Settings to add your Anthropic API key.]";
  try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages:messages.map(m=>({role:m.role,content:m.content}))})});
  if(!r.ok){const e=await r.json().catch(()=>({}));return"API error "+r.status+": "+(e.error?.message||r.statusText);}
  const data=await r.json();return data.content?.map(b=>b.text||"").join("")||"No response.";}catch(e){return"Network error: "+e.message;}
};

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>

<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useRef}=React;
const ASPECTS=window.ASPECTS,MAX_WORLDS=window.MAX_WORLDS,db=window.db,aiCall=window.aiCall;

const T={bg:"#0f0f0f",sf:"#1a1a1e",sfH:"#222228",card:"#1e1e24",bd:"#2a2a32",
  gold:"#c8a24e",goldD:"#8a7030",tx:"#e8e4dc",txD:"#8a8680",txM:"#b8b4ac",red:"#8a3a3a",redTx:"#d46a6a"};
const iS={width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid "+T.bd,background:T.bg,color:T.tx,fontSize:14,fontFamily:"inherit",outline:"none"};

function Modal({open,title,children,onClose}){
  if(!open)return null;
  return(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={onClose}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.75)"}}/>
    <div style={{position:"relative",background:T.sf,border:"1px solid "+T.bd,borderRadius:12,padding:20,width:"100%",maxWidth:360}} onClick={e=>e.stopPropagation()}>
      {title&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.gold,marginBottom:16}}>{title}</div>}
      {children}</div></div>);
}

function Hdr({title,subtitle,onBack,right}){
  return(<div style={{padding:"16px 20px 12px",borderBottom:"1px solid "+T.bd,background:"linear-gradient(180deg,"+T.sf+" 0%,"+T.bg+" 100%)",position:"sticky",top:0,zIndex:10}}>
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      {onBack&&<button onClick={onBack} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",padding:"4px 8px 4px 0"}}>{"‹"}</button>}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:title.length>22?18:24,fontWeight:700,color:T.gold,lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title}</div>
        {subtitle&&<div style={{fontSize:12,color:T.txD,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{subtitle}</div>}
      </div>{right}</div></div>);
}

function Row({icon,label,detail,count,onClick,danger}){
  const[p,sP]=useState(false);
  return(<button onClick={onClick} onPointerDown={()=>sP(true)} onPointerUp={()=>sP(false)} onPointerLeave={()=>sP(false)}
    style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 20px",background:p?T.sfH:"none",
      border:"none",borderBottom:"1px solid "+T.bd+"11",cursor:"pointer",textAlign:"left",color:danger?T.redTx:T.tx,transition:"background .1s"}}>
    <span style={{fontSize:22,width:32,textAlign:"center",flexShrink:0}}>{icon}</span>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:15,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
      {detail&&<div style={{fontSize:12,color:T.txD,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{detail}</div>}
    </div>
    {count!==undefined&&<span style={{fontSize:12,color:T.txD,background:T.sf,padding:"2px 8px",borderRadius:10,flexShrink:0}}>{count}</span>}
    <span style={{color:T.txD,fontSize:14,flexShrink:0}}>{"›"}</span>
  </button>);
}

function Btn({children,onClick,v="p",full,sm,disabled,style:s}){
  const m={p:{background:T.gold,color:T.bg,fontWeight:600},s:{background:T.sf,color:T.tx,border:"1px solid "+T.bd},
    g:{background:"none",color:T.gold},d:{background:T.red,color:"#fff"}};
  return(<button onClick={onClick} disabled={disabled} style={{...m[v],border:m[v].border||"none",padding:sm?"6px 14px":"12px 20px",
    borderRadius:8,fontSize:sm?13:14,cursor:disabled?"default":"pointer",width:full?"100%":"auto",fontFamily:"inherit",opacity:disabled?0.4:1,...s}}>{children}</button>);
}

function Bub({msg}){
  const u=msg.role==="user";
  const filed=msg._filed;
  return(<div style={{display:"flex",justifyContent:u?"flex-end":"flex-start",padding:"4px 16px"}}>
    <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:u?"16px 16px 4px 16px":"16px 16px 16px 4px",
      background:u?T.gold+"22":T.sf,border:"1px solid "+(u?T.gold+"33":T.bd),
      fontSize:14,lineHeight:1.55,whiteSpace:"pre-wrap",wordBreak:"break-word",color:T.tx}}>
      {msg.content}
      {msg.source==="cross-world"&&<div style={{fontSize:11,color:T.goldD,marginTop:6}}>Cross-world note</div>}
      {filed&&filed.length>0&&<div style={{fontSize:11,color:T.goldD,marginTop:6,borderTop:"1px solid "+T.bd,paddingTop:4}}>
        {filed.map((f,i)=><div key={i}>{"📁 → "+f}</div>)}</div>}
    </div>
  </div>);
}

function App(){
  const[scr,setScr]=useState("main");
  const[worlds,setWorlds]=useState([]);
  const[cW,setCW]=useState(null);
  const[cA,setCA]=useState(null);
  const[cC,setCC]=useState(null);
  const[cList,setCList]=useState([]);
  const[topics,setTopics]=useState([]);
  const[sheet,setSheet]=useState("");
  const[inp,setInp]=useState("");
  const[busy,setBusy]=useState(false);
  const[toast,setToast]=useState("");
  const[gen,setGen]=useState(false);
  const[worldChat,setWorldChat]=useState(false);
  const[impTxt,setImpTxt]=useState("");
  const[mod,setMod]=useState(null);
  const[modIn,setModIn]=useState("");
  const[bibleData,setBibleData]=useState(null);
  const[curTopic,setCurTopic]=useState(null);
  const[topicList,setTopicList]=useState([]);
  const[aspTopicCounts,setAspTopicCounts]=useState({});
  const[providerSel,setProviderSel]=useState("claude");
  const[customEndpoint,setCustomEndpoint]=useState("");
  const[apiKey,setApiKey]=useState("");
  const[apiKeyInput,setApiKeyInput]=useState("");
  const[hasKey,setHasKey]=useState(false);
  const endRef=useRef(null);

  const flash=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const ldW=useCallback(async()=>{setWorlds(await db.listWorlds());},[]);
  useEffect(()=>{ldW();db.getApiKey().then(k=>{if(k){setApiKey(k);setHasKey(true);}});db.getProvider().then(p=>setProviderSel(p||"claude"));db.getCustomEndpoint().then(u=>setCustomEndpoint(u||""));},[]);
  useEffect(()=>{if(scr==="chat")endRef.current?.scrollIntoView({behavior:"smooth"});},[cC?.messages?.length,scr]);

  const goMain=()=>{setScr("main");setCW(null);setCA(null);setCC(null);setGen(false);setWorldChat(false);};
  const goWorlds=async()=>{await ldW();setScr("worlds");};
  const goWorld=async(w)=>{setCW(w);setCA(null);setCC(null);setWorldChat(false);setScr("world");
    const counts={};for(const a of ASPECTS){counts[a.id]=await db.countTopics(w.id,a.id);}setAspTopicCounts(counts);};
  const goAspect=async(a)=>{setCA(a);setCList(await db.listChats(cW.id,a.id));setTopicList(await db.listTopics(cW.id,a.id));setScr("aspect");};
  const goTopicDetail=t=>{setCurTopic(t);setScr("topicdetail");};
  const goChat=async(ch,g=false,wc=false)=>{
    const wid=g?"__general__":cW.id;
    const aid=g?"__general__":(wc?"__worldchat__":cA.id);
    const full=await db.loadChat(wid,aid,ch.id);
    if(full){setCC(full);setGen(g);setWorldChat(wc);setScr("chat");}
  };
  const goGen=async()=>{setCList(await db.listGeneralChats());setGen(true);setWorldChat(false);setCW(null);setCA(null);setScr("general");};

  const openNewWorld=()=>{setModIn("");setMod({t:"newWorld"});};
  const doNewWorld=async()=>{const n=modIn.trim();setMod(null);if(!n)return;if(worlds.length>=MAX_WORLDS){flash("Max "+MAX_WORLDS);return;}const w=await db.createWorld(n);flash("Created: "+n);await ldW();goWorld(w);};

  // World General Chat - sends to AI with auto-categorize instructions
  const goWorldChat=async()=>{
    const chats=await db.listChats(cW.id,"__worldchat__");
    setCList(chats);setWorldChat(true);setGen(false);setScr("worldchatlist");
  };

  const send=async()=>{
    if(!inp.trim()||busy)return;
    const txt=inp.trim();setInp("");
    const chat={...cC,messages:[...(cC.messages||[]),{role:"user",content:txt,timestamp:new Date().toISOString()}]};
    setCC(chat);setBusy(true);
    let sys;
    const aspectIds=ASPECTS.map(a=>a.id).join(", ");

    if(gen){
      // Global general chat
      const wl=worlds.map(w=>w.name).join(", ");
      sys="You are WorldForge, a creative worldbuilding assistant in General Chat mode.\nAvailable worlds: "+(wl||"None")+"\nIf the user mentions something for a specific world, after your creative response add on its own line:\n[FILE: WorldName > aspect-id] brief summary\nValid aspect IDs: "+aspectIds+"\nBe warm, creative, collaborative.";
    } else if(worldChat){
      // World general chat - discuss anything, auto-categorize
      const bible=await db.getBible(cW.id);
      const bt=Object.entries(bible.facts||{}).map(([c,e])=>"["+c+"]\n"+Object.entries(e).map(([k,v])=>"  "+k+": "+v).join("\n")).join("\n");
      sys="You are WorldForge, a creative worldbuilding assistant.\nWorld: \""+cW.name+"\" | Mode: Open Discussion (all aspects)\n\nWORLD BIBLE:\n"+(bt||"(Empty)")+"\n\nThe user is brainstorming freely about this world across any topic - characters, locations, history, magic, politics, etc.\nBe warm, creative, detailed. Connect ideas across aspects.\n\nIMPORTANT: After each response, categorize what was discussed by adding on separate lines:\n[CAT: aspect-id] brief summary of what was discussed\nValid aspect IDs: "+aspectIds+"\nThis helps auto-file discussions to the right aspect. You can add multiple [CAT:] lines if multiple aspects were covered.";
    } else {
      // Specific aspect chat
      const bible=await db.getBible(cW.id);
      const bt=Object.entries(bible.facts||{}).map(([c,e])=>"["+c+"]\n"+Object.entries(e).map(([k,v])=>"  "+k+": "+v).join("\n")).join("\n");
      sys="You are WorldForge, a creative worldbuilding assistant.\nWorld: \""+cW.name+"\" | Aspect: \""+cA.name+"\"\n\nWORLD BIBLE:\n"+(bt||"(Empty)")+"\n\nBe warm, creative, detailed. Connect ideas across aspects. If new idea contradicts Bible, warn.";
    }

    let resp=await aiCall(sys,chat.messages);
    const filed=[];

    if(gen){
      // Parse [FILE:] directives for global general chat
      const fp=/\[FILE:\s*(.+?)\s*>\s*(.+?)\]\s*(.+?)(?:\n|$)/g;
      let m;
      while((m=fp.exec(resp))!==null){
        const w=worlds.find(w=>w.name.toLowerCase().includes(m[1].toLowerCase().trim()));
        const a=ASPECTS.find(a=>a.id===m[2].trim()||a.name.toLowerCase().includes(m[2].toLowerCase().trim()));
        if(w&&a){await db.fileNote(w.id,a.id,m[3].trim());filed.push(w.name+" > "+a.name);}
      }
      resp=resp.replace(fp,"").trim();
    }

    if(worldChat){
      // Parse [CAT:] directives for world general chat and file to aspects
      const cp=/\[CAT:\s*(.+?)\]\s*(.+?)(?:\n|$)/g;
      let m;
      while((m=cp.exec(resp))!==null){
        const a=ASPECTS.find(a=>a.id===m[1].trim()||a.name.toLowerCase().includes(m[1].toLowerCase().trim()));
        if(a){await db.fileNote(cW.id,a.id,m[2].trim());filed.push(cW.name+" > "+a.name);}
      }
      resp=resp.replace(cp,"").trim();
    }

    const aiMsg={role:"assistant",content:resp,timestamp:new Date().toISOString()};
    if(filed.length)aiMsg._filed=filed;
    const upd={...chat,messages:[...chat.messages,aiMsg]};
    setCC(upd);await db.saveChat(upd);setBusy(false);
  };

  const doTopics=async()=>{
    if(!cW||!cA)return;setBusy(true);
    const text=await db.gatherAspectText(cW.id,cA.id);
    if(!text.trim()){setTopics([]);setBusy(false);flash("No chats yet");return;}
    const sys="You are a data extractor. "+cA.topicPrompt+" from the text.\nReturn ONLY a JSON array: [{\"name\":\"...\",\"brief\":\"...\"}]\nNo preamble.";
    const resp=await aiCall(sys,[{role:"user",content:text.slice(0,8000)}],1024);
    try{const c=resp.trim().replace(/^```\w*\n?/,"").replace(/\n?```$/,"");const a=c.match(/\[[\s\S]*\]/);setTopics(a?JSON.parse(a[0]):[]);}
    catch(e){setTopics([]);flash("Parse error");}
    setBusy(false);setScr("topics");
  };

  const doSheet=async(name)=>{
    setBusy(true);setScr("charsheet");
    const text=await db.gatherAspectText(cW.id,"characters");const bible=await db.getBible(cW.id);
    const sys="Create a Baldur's Gate style character sheet for \""+name+"\" in \""+cW.name+"\". Use ONLY conversation data. For unknowns write \"Unknown\". Include: Name, Race, Class, Alignment, Level, Stats, Background, Traits, Abilities, Equipment, Relationships, Description, Notes.";
    const resp=await aiCall(sys,[{role:"user",content:"Bible: "+JSON.stringify(bible.facts)+"\n\nConversations:\n"+text.slice(0,6000)}],1024);
    setSheet(resp);setBusy(false);
  };

  const doExport=async()=>{setBusy(true);const data=await db.exportAll();const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="worldforge-export.json";a.click();URL.revokeObjectURL(url);setBusy(false);flash("Exported!");};
  const doImport=async()=>{if(!impTxt.trim())return;try{const d=JSON.parse(impTxt);const c=await db.importAll(d);flash("Imported "+c.worlds+"w "+c.chats+"c "+c.topics+"t");setImpTxt("");await ldW();setScr("settings");}catch(e){flash("Invalid JSON");}};
  const saveSettings=async()=>{const k=apiKeyInput.trim();if(k){await db.setApiKey(k);setApiKey(k);setHasKey(true);}else{await db.setApiKey(null);setApiKey("");setHasKey(false);}await db.setProvider(providerSel);await db.setCustomEndpoint(customEndpoint);flash("Saved!");};
  const openBible=async()=>{if(!cW)return;const b=await db.getBible(cW.id);setBibleData(b.facts||{});setMod({t:"bible"});};
  const openFact=()=>{setModIn("");setMod({t:"fact"});};
  const doFact=async()=>{const r=modIn.trim();setMod(null);if(!r||!cW)return;const m=r.match(/(.+?)\s*-\s*(.+?):\s*(.+)/);if(m){await db.addFact(cW.id,m[1].trim().toLowerCase().replace(/\s+/g,'-'),m[2].trim(),m[3].trim());flash("Added to Bible");}else flash("Format: cat - key: value");};
  const openNote=()=>{setModIn("");setMod({t:"note1"});};
  const doNote1=()=>{const r=modIn.trim();if(!r||!r.includes(">")){flash("World > Aspect");return;}const[ws,as]=r.split(">");const w=worlds.find(w=>w.name.toLowerCase().includes(ws.trim().toLowerCase()));const a=ASPECTS.find(a=>a.name.toLowerCase().includes(as.trim().toLowerCase())||a.id.includes(as.trim().toLowerCase()));if(!w||!a){flash("Not found");return;}setMod({t:"note2",w,a});setModIn("");};
  const doNote2=async()=>{const n=modIn.trim();if(!n||!mod?.w||!mod?.a){setMod(null);return;}await db.fileNote(mod.w.id,mod.a.id,n);flash("Filed to "+mod.w.name+" > "+mod.a.name);setMod(null);};

  const S=(ch)=>(
    <div style={{maxWidth:480,margin:"0 auto",height:"100%",background:T.bg,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
      {ch}
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:T.card,border:"1px solid "+T.gold+"44",color:T.gold,padding:"10px 20px",borderRadius:10,fontSize:13,zIndex:100,fontWeight:500}}>{toast}</div>}
      <Modal open={mod?.t==="newWorld"} title="Create World" onClose={()=>setMod(null)}>
        <input autoFocus value={modIn} onChange={e=>setModIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doNewWorld()} placeholder="World name..." style={iS}/>
        <div style={{display:"flex",gap:8,marginTop:12}}><Btn full onClick={doNewWorld} disabled={!modIn.trim()}>Create</Btn><Btn v="s" onClick={()=>setMod(null)}>Cancel</Btn></div>
      </Modal>
      <Modal open={mod?.t==="fact"} title="Add to Bible" onClose={()=>setMod(null)}>
        <div style={{fontSize:12,color:T.txD,marginBottom:8}}>category - key: value</div>
        <input autoFocus value={modIn} onChange={e=>setModIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doFact()} placeholder="characters - Kael: Former soldier" style={iS}/>
        <div style={{display:"flex",gap:8,marginTop:12}}><Btn full onClick={doFact} disabled={!modIn.trim()}>Add</Btn><Btn v="s" onClick={()=>setMod(null)}>Cancel</Btn></div>
      </Modal>

    <div style={{flex:1,overflowY:"auto"}}>
      <Row icon="💬" label="World Chat" detail="Discuss anything — auto-categorized" onClick={goWorldChat}/>

  if(scr==="aspect"&&cW&&cA)return S(<>

      <Row icon="💬" label="Continue Chat" count={cList.length} onClick={()=>{if(cList.length)setScr("chatlist");else flash("No chats yet");}}/>

    </div>
    {cList.length>0&&<div style={{padding:"16px 20px"}}>
      <div style={{fontSize:11,color:T.txD,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Recent</div>
      {cList.slice(0,3).map(c=><div key={c.id} onClick={()=>goChat(c)} style={{padding:"10px 12px",marginBottom:4,background:T.sf,borderRadius:8,cursor:"pointer"}}>
        <div style={{fontSize:13,color:T.txM}}>{c.title}</div>
        <div style={{fontSize:11,color:T.txD,marginTop:2}}>{(c.messages?.length||0)+" messages"}</div>
      </div>)}
    </div>}

  if(scr==="chatlist")return S(<>
    <Hdr title="Continue Chat" subtitle={cA?.name||"General"} onBack={()=>setScr(gen?"general":"aspect")}/>

  </>);

  if(scr==="worldchatlist")return S(<>

    {cList.length===0
      ?<div style={{padding:"60px 32px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:16,opacity:.4}}>💬</div>
        <div style={{color:T.txD,fontSize:14,marginBottom:20}}>No world chats yet</div>

      :topicList.map(t=><Row key={t.id} icon={cA.topicType==="character"?"👤":"📌"} label={t.name||t.id}

    <div style={{flex:1,overflowY:"auto",padding:16}}>

          <div style={{fontSize:13,color:T.txM,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{typeof v==="object"?JSON.stringify(v,null,2):String(v)}</div>
        </div>

      {curTopic.timeline&&curTopic.timeline.length>0&&<>
        <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:T.goldD,marginTop:12,marginBottom:8}}>Timeline</div>
        {curTopic.timeline.map((ev,i)=><div key={i} style={{padding:"8px 14px",background:T.sf,borderRadius:8,border:"1px solid "+T.bd,marginBottom:4,fontSize:13}}>
          <span style={{color:T.gold,fontWeight:600}}>Year {ev.year}</span>
          <span style={{color:T.txM,marginLeft:8}}>{ev.event}</span>
        </div>)}
      </>}
      {curTopic.source==="azgaar"&&<div style={{fontSize:11,color:T.gold,marginTop:12}}>📍 Imported from Azgaar map</div>}
      {(!curTopic.fields||Object.keys(curTopic.fields).length===0)&&<div style={{padding:"40px 0",textAlign:"center",color:T.txD,fontSize:14}}>No fields yet</div>}
    </div>
  </>);

  if(scr==="general")return S(<>
    <Hdr title="General Chat" subtitle="Freeform worldbuilding" onBack={goMain}
      right={<Btn sm onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWorldChat(false);setScr("chat");}}>+ New</Btn>}/>
    {cList.length===0
      ?<div style={{padding:"60px 32px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:16,opacity:.4}}>💬</div>
        <div style={{color:T.txD,fontSize:14,marginBottom:20}}>No general chats yet</div>
        <Btn onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWorldChat(false);setScr("chat");}}>New Chat</Btn></div>
      :cList.map(c=><Row key={c.id} icon="💬" label={c.title} detail={new Date(c.updated).toLocaleDateString()+" · "+(c.messages?.length||0)+" msgs"} onClick={()=>goChat(c,true)}/>)}
  </>);

  if(scr==="chat"&&cC)return S(
    <React.Fragment>
      <Hdr title={gen?"General Chat":(worldChat?"World Chat":(cA?.name||"Chat"))}
        subtitle={gen?cC.title:((cW?.name||"")+(worldChat?"":" · "+(cA?.name||"")))}
        onBack={()=>{setScr(gen?"general":(worldChat?"worldchatlist":"aspect"));setCC(null);}}
        right={<div style={{display:"flex",gap:2}}>
          {!gen&&<Btn sm v="g" onClick={openFact} style={{fontSize:16,padding:"4px 8px"}}>📝</Btn>}
          <Btn sm v="g" onClick={openNote} style={{fontSize:16,padding:"4px 8px"}}>↗</Btn>
          {!gen&&<Btn sm v="g" onClick={openBible} style={{fontSize:16,padding:"4px 8px"}}>📖</Btn>}
        </div>}/>
      <div style={{flex:1,overflowY:"auto",padding:"12px 0"}}>
        {(!cC.messages||cC.messages.length===0)&&<div style={{padding:"40px 24px",textAlign:"center",color:T.txD,fontSize:13}}>
          {gen?"Type anything. Mention a world to auto-file notes.":(worldChat?"Discuss anything about "+cW.name+". Topics auto-file to the right aspect.":"Start worldbuilding!")}</div>}
        {(cC.messages||[]).map((m,i)=><Bub key={i} msg={m}/>)}
        {busy&&<div style={{padding:"12px 20px",color:T.goldD,fontSize:13,fontStyle:"italic"}}>Forging response...</div>}
        <div ref={endRef}/>

          rows={1} style={{flex:1,resize:"none",padding:"10px 14px",borderRadius:12,border:"1px solid "+T.bd,
            background:T.bg,color:T.tx,fontSize:14,fontFamily:"inherit",outline:"none",maxHeight:120,lineHeight:1.4}}
          onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}/>
        <button onClick={send} disabled={busy||!inp.trim()} style={{background:T.gold,border:"none",borderRadius:12,width:44,height:44,
          cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          opacity:busy||!inp.trim()?0.4:1,fontSize:18,flexShrink:0,color:T.bg,fontWeight:700}}>↑</button>
      </div>
    </React.Fragment>
  );

  if(scr==="settings")return S(<div style={{flex:1,overflowY:"auto"}}>
    <Hdr title="Settings" onBack={goMain}/>
    <div style={{padding:"20px 20px 0"}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>API Key</div>
      <div style={{fontSize:12,color:T.txD,marginBottom:10,lineHeight:1.5}}>Required for AI features. Get yours at console.anthropic.com</div>
      <input type="password" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder="sk-ant-api03-..." style={{...iS,fontFamily:"monospace",fontSize:13}}/>
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <Btn full onClick={saveSettings}>{hasKey?"Update":"Save Key"}</Btn>
        {hasKey&&<Btn v="s" onClick={async()=>{setApiKeyInput("");await db.setApiKey(null);setApiKey("");setHasKey(false);flash("Key removed");}}>Remove</Btn>}
      </div>
      <div style={{fontSize:11,color:T.txD,marginTop:8}}>{hasKey?"✅ Key saved":"⚠️ No key"}</div>
    </div>
    <div style={{margin:"16px 20px 0",borderTop:"1px solid "+T.bd,paddingTop:16}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Provider</div>
      <select value={providerSel} onChange={e=>setProviderSel(e.target.value)} style={{...iS,maxWidth:300,marginBottom:8}}>
        <option value="claude">Claude (Anthropic)</option><option value="deepseek">DeepSeek</option><option value="custom">Custom</option>
      </select>
      {providerSel==="custom"&&<input value={customEndpoint} onChange={e=>setCustomEndpoint(e.target.value)} placeholder="https://..." style={{...iS,marginBottom:8}}/>}
      <Btn full v="s" onClick={saveSettings}>Save Provider</Btn>
    </div>
    <div style={{margin:"16px 20px 0",borderTop:"1px solid "+T.bd,paddingTop:16}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Data</div>
    </div>
    <Row icon="📤" label="Export All Data" detail="Download JSON for desktop sync" onClick={doExport}/>
    <Row icon="📥" label="Import Data" detail="Load JSON from desktop" onClick={()=>setScr("import")}/>
    <Row icon="🗑️" label="Delete All Data" detail="Cannot be undone" danger onClick={()=>setMod({t:"delAll"})}/>
    <div style={{padding:"24px 20px"}}><div style={{fontSize:11,color:T.txD,lineHeight:1.6}}>WorldForge Mobile v3{"\n"}AI: {providerSel}{"\n"}Storage: IndexedDB (local){"\n"}Export format v5</div></div>
  </div>);

  if(scr==="import")return S(<>
    <Hdr title="Import Data" onBack={()=>setScr("settings")}/>
    <div style={{padding:20}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Upload File</div>
      <label style={{display:"block",width:"100%",padding:"16px 20px",borderRadius:8,background:T.sf,border:"1px solid "+T.bd,color:T.tx,fontSize:14,textAlign:"center",cursor:"pointer",marginBottom:16}}>
        📂 Choose worldforge-export.json
        <input type="file" accept=".json,application/json" style={{display:"none"}} onChange={async e=>{
          const f=e.target.files[0];if(!f)return;try{const txt=await f.text();const d=JSON.parse(txt);const c=await db.importAll(d);flash("Imported "+c.worlds+"w "+c.chats+"c "+c.topics+"t");await ldW();setScr("settings");}catch(err){flash("Invalid JSON file");}
        }}/>
      </label>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Or Paste JSON</div>
      <textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} placeholder="Paste JSON here..." rows={8}
        style={{width:"100%",resize:"vertical",padding:14,borderRadius:8,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:13,fontFamily:"monospace",outline:"none",lineHeight:1.5}}/>
      <div style={{display:"flex",gap:8,marginTop:12}}><Btn full onClick={doImport}>Import Text</Btn><Btn v="s" onClick={()=>{setImpTxt("");setScr("settings");}}>Cancel</Btn></div>
    </div>
  </>);

  return S(<div style={{padding:40,textAlign:"center",color:T.txD}}>Loading...</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
