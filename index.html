<script>
// === IndexedDB ===
const IDB={
  _db:null,
  open(){return new Promise((res,rej)=>{if(this._db)return res(this._db);const r=indexedDB.open('worldforge-mobile',1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};r.onsuccess=e=>{this._db=e.target.result;res(this._db);};r.onerror=e=>rej(e);});},
  async get(k){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>res(t.result===undefined?null:t.result);t.onerror=e=>rej(e);});},
  async set(k,v){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});},
  async del(k){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});},
  async list(p){const d=await this.open();return new Promise((res,rej)=>{const ks=[];const rng=IDBKeyRange.bound(p,p+'\uffff');const t=d.transaction('kv','readonly').objectStore('kv').openCursor(rng);t.onsuccess=e=>{const c=e.target.result;if(c){ks.push(c.key);c.continue();}else res(ks);};t.onerror=e=>rej(e);});},
  async clear(){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').clear();t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});}
};

// === Utilities ===
function normTag(t){return t.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');}
function normTags(a){return[...new Set((a||[]).map(normTag).filter(t=>t.length>0))];}
function mkId(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);}
function safeArr(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==='object')return Object.values(v);return[];}

// === COA + MFCG ===
window.coaUrl=function(coa){if(!coa)return null;try{return"https://armoria.herokuapp.com/?coa="+encodeURIComponent(JSON.stringify(coa));}catch(e){return null;}};
window.mfcgUrl=function(burg,seed){if(!burg)return null;const s=seed||burg.MFCG||burg.i||0;const size=Math.max(1,Math.min(60,Math.round((burg.population||1)*10)));return"https://watabou.github.io/city-generator/?seed="+s+"&size="+size+(burg.port?"&coast=1":"")+(burg.citadel?"&citadel=1":"")+(burg.walls?"&walls=1":"")+(burg.plaza?"&plaza=1":"")+(burg.temple?"&temple=1":"")+(burg.shanty?"&shanty=1":"");};

// === Azgaar Parser ===
window.parseAzgaarMap=function(text){
  const R={svg:null,pack:null,params:null,error:null,debug:[]};
  try{R.debug.push("Size:"+text.length);
    const ss=text.indexOf('<svg'),se=text.lastIndexOf('</svg>');
    if(ss<0||se<0){R.error="No SVG";return R;}
    R.svg=text.substring(ss,se+6);
    const fl=text.substring(0,ss).split('\n')[0].trim();
    if(fl.startsWith('{')){try{R.params=JSON.parse(fl);}catch(e){}}
    const after=text.substring(se+6);
    const objs=[];let d=0,os=-1;
    for(let i=0;i<after.length;i++){if(after[i]==='{'){if(d===0)os=i;d++;}else if(after[i]==='}'){d--;if(d===0&&os>=0){objs.push({s:os,e:i+1});os=-1;}}}
    for(let i=0;i<objs.length;i++){
      const str=after.substring(objs[i].s,objs[i].e);
      try{const o=JSON.parse(str);if(o.states||o.burgs||o.cultures){R.pack=o;R.debug.push("Pack at "+i);break;}
        if(o.cells||o.vertices){continue;}}catch(e){R.debug.push("Obj "+i+" fail");}}
    if(!R.pack)R.error="Pack not found";
  }catch(e){R.error=e.message;}
  return R;
};

// === Topic Generation from Azgaar Pack ===
window.generateTopicsFromPack=function(pack,wid,params){
  const T=[];if(!pack)return T;
  const states=safeArr(pack.states),burgs=safeArr(pack.burgs),cultures=safeArr(pack.cultures),
    religions=safeArr(pack.religions),rivers=safeArr(pack.rivers),military=safeArr(pack.military),
    provinces=safeArr(pack.provinces),cells=pack.cells||{};
  const sN={},cN={},rN={};
  states.forEach(s=>{if(s&&s.i>0)sN[s.i]=s.name||s.fullName||"State "+s.i;});
  cultures.forEach(c=>{if(c&&c.i>0)cN[c.i]=c.name||"Culture "+c.i;});
  religions.forEach(r=>{if(r&&r.i>0)rN[r.i]=r.name||"Religion "+r.i;});
  const biomeNames=["Marine","Hot desert","Cold desert","Savanna","Grassland","Tropical seasonal forest","Temperate deciduous forest","Tropical rainforest","Temperate rainforest","Taiga","Tundra","Glacier","Wetland"];
  const getBiome=(cellId)=>{if(cells.biome&&cells.biome[cellId]!==undefined){const bi=cells.biome[cellId];return biomeNames[bi]||"Biome "+bi;}return"";};
  const getElev=(cellId)=>cells.h&&cells.h[cellId]!==undefined?cells.h[cellId]:null;
  const getTemp=(cellId)=>cells.temp&&cells.temp[cellId]!==undefined?cells.temp[cellId]:null;
  // States -> politics
  states.forEach(s=>{
    if(!s||!s.i||s.i===0||s.removed)return;
    const cap=s.capital&&burgs[s.capital]?burgs[s.capital]:null;
    const cult=s.culture?cN[s.culture]||"?":"?";const rel=s.religion?rN[s.religion]||"?":"?";
    const totalPop=Math.round(((s.rural||0)+(s.urban||0))*1000);
    const diplo=[];if(s.diplomacy)s.diplomacy.forEach((d,i)=>{if(i>0&&d&&d!=="x"&&d!=="Neutral"&&sN[i])diplo.push(sN[i]+": "+d);});
    const provs=provinces.filter(p=>p&&p.state===s.i&&p.name).map(p=>p.fullName||p.name);
    T.push({id:"azg-state-"+s.i,name:s.fullName||s.name,brief:(s.fullName||s.name)+", "+cult+" "+(s.form||"state")+". Pop: "+totalPop.toLocaleString(),
      template:"system",tags:normTags([s.form||"",cult,"state",s.name]),aspect_id:"politics",world_id:wid,source:"azgaar",
      coa:s.coa||null,color:s.color||"",born_year:null,died_year:null,timeline:[],
      fields:{principle:"Government: "+(s.form||"Unknown"),components:["Total population: "+totalPop.toLocaleString(),"Rural: "+Math.round((s.rural||0)*1000).toLocaleString(),"Urban: "+Math.round((s.urban||0)*1000).toLocaleString(),"Area: "+(s.area?Math.round(s.area):"?")+" cells"],
        practitioners:"Culture: "+cult+"\nReligion: "+rel,effects:"Capital: "+(cap?cap.name:"?")+"\n"+(provs.length?"Provinces: "+provs.join(", "):""),limitations:diplo.length?"Diplomacy:\n"+diplo.join("\n"):"",origin:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });
  // Burgs -> locations + notable-locations
  burgs.forEach(b=>{
    if(!b||!b.i||b.i===0||!b.name)return;
    const st=b.state?sN[b.state]||"Unclaimed":"Unclaimed";const cult=b.culture?cN[b.culture]||"?":"?";const rel=b.religion?rN[b.religion]||"?":"?";
    const pop=Math.round((b.population||0)*1000);const feats=[];
    if(b.capital)feats.push("Capital");if(b.port)feats.push("Port");if(b.citadel)feats.push("Citadel");if(b.walls)feats.push("Walled");if(b.plaza)feats.push("Market");if(b.temple)feats.push("Temple");if(b.shanty)feats.push("Shantytown");
    const biome=b.cell?getBiome(b.cell):"";const tags=normTags([st,cult,...feats,b.name,biome]);const mfcg=window.mfcgUrl(b);
    T.push({id:"azg-loc-"+b.i,name:b.name,brief:b.name+(b.capital?" (capital)":"")+", "+st+". Pop: "+pop.toLocaleString(),
      template:"location",tags,aspect_id:"locations",world_id:wid,source:"azgaar",
      coa:b.coa||null,mfcg_url:mfcg,coords:{x:b.x||0,y:b.y||0},born_year:null,died_year:null,timeline:[],
      fields:{type:feats.length?feats.join(", "):"Settlement",region:st,population:pop.toLocaleString(),government:st,culture:cult,religion:rel,
        climate:(biome||"")+(getTemp(b.cell)!==null?" ("+getTemp(b.cell)+"\u00b0)":""),resources:"Elevation: "+(getElev(b.cell)!==null?getElev(b.cell):"?"),features:feats,mfcg_url:mfcg},
      created:new Date().toISOString(),updated:new Date().toISOString()});
    if(b.capital||feats.length>=2){
      T.push({id:"azg-notable-"+b.i,name:b.name,brief:b.name+" — "+(b.capital?"Capital of "+st:feats.join(", ")),
        template:"notable",tags:[...tags,"notable"],aspect_id:"notable-locations",world_id:wid,source:"azgaar",
        coa:b.coa||null,mfcg_url:mfcg,coords:{x:b.x||0,y:b.y||0},born_year:null,died_year:null,timeline:[],
        fields:{significance:b.capital?"Capital of "+st:"Notable for "+feats.join(", "),physical_desc:feats.join(", ")+(biome?" in "+biome:""),history_events:"",connected_entities:st+", "+cult,history:"Pop: "+pop.toLocaleString()},
        created:new Date().toISOString(),updated:new Date().toISOString()});}
  });
  // Cultures
  cultures.forEach(c=>{if(!c||!c.i||c.i===0||c.removed)return;const parent=c.base!==undefined&&cN[c.base]?cN[c.base]:"Indigenous";
    T.push({id:"azg-culture-"+c.i,name:c.name||"Culture "+c.i,brief:(c.name||"")+" — "+(c.type||"")+" culture",
      template:"culture",tags:normTags([c.type||"",c.name,"culture"]),aspect_id:"cultures",world_id:wid,source:"azgaar",
      coa:c.coa||null,born_year:null,died_year:null,timeline:[],
      fields:{origin:"Type: "+(c.type||"?")+"\nDerived from: "+parent+"\nShield: "+(c.shield||"heater"),values_beliefs:"",customs_practices:"Naming: "+(c.code||"default"),art_expression:"",social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});});
  // Religions
  religions.forEach(r=>{if(!r||!r.i||r.i===0||r.removed)return;const originCult=r.culture!==undefined?cN[r.culture]||"?":"?";
    T.push({id:"azg-religion-"+r.i,name:r.name||"Religion "+r.i,brief:(r.name||"")+" — "+(r.form||"")+" "+(r.type||"religion")+". Origin: "+originCult,
      template:"culture",tags:normTags([r.type||"",r.form||"",r.name,"religion"]),aspect_id:"religion-beliefs",world_id:wid,source:"azgaar",
      born_year:null,died_year:null,timeline:[],
      fields:{origin:"Type: "+(r.type||"?")+"\nForm: "+(r.form||"?")+"\nOrigin: "+originCult,values_beliefs:r.deity?"Central deity: "+r.deity:"No central deity",customs_practices:"",art_expression:"",social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});});
  // Rivers
  rivers.forEach(rv=>{if(!rv||!rv.i||!rv.name)return;
    T.push({id:"azg-river-"+rv.i,name:rv.name+(rv.type&&rv.type!=="River"?" ("+rv.type+")":""),brief:rv.name+" — "+(rv.type||"river"),
      template:"geography",tags:normTags([rv.type||"river",rv.name,"geography"]),aspect_id:"geography",world_id:wid,source:"azgaar",
      born_year:null,died_year:null,timeline:[],fields:{type:rv.type||"River",scale:"Length: "+(rv.length?Math.round(rv.length):"?"),physical_desc:"",climate_ecology:"Basin: "+(rv.basin||"?"),resources:"",connected:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});});
  // Military
  military.forEach((m,idx)=>{if(!m||idx===0)return;const units=safeArr(m);if(!units.length)return;const sn=sN[idx]||"State "+idx;
    const regs=units.map(r=>(r.name||"Unit")+" ("+(r.type||"?")+": "+(r.n||0)+")").slice(0,15);
    T.push({id:"azg-mil-"+idx,name:sn+" Armed Forces",brief:"Military of "+sn+" — "+units.length+" regiments",
      template:"system",tags:normTags([sn,"military"]),aspect_id:"military",world_id:wid,source:"azgaar",
      born_year:null,died_year:null,timeline:[],fields:{principle:sn+" military forces",composition:regs,command:sn,doctrine:"",campaigns:[],strengths:"Total: "+units.length+" regiments",limitations:"",origin:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});});
  return T;
};

// === Config ===
const CARD_TMPL={entity:["characters","organizations"],location:["locations"],notable:["notable-locations","architecture"],system:["magic-technology","politics","economy","languages","education","healthcare","transportation"],culture:["cultures","religion-beliefs","arts-entertainment","food-cuisine","fashion","calendar-time"],event:["history","military","story-elements","cosmology"],creature:["flora-fauna"],geography:["geography"]};
const TMPL_FOR={};Object.entries(CARD_TMPL).forEach(([t,ids])=>ids.forEach(id=>TMPL_FOR[id]=t));
window.TMPL_FOR=TMPL_FOR;
const CAT_RULES=`CATEGORY RULES - follow strictly:
- characters: Named individuals with agency who act and decide.
- locations: Every named place (cities, towns, regions, bodies of water).
- notable-locations: Places with narrative SIGNIFICANCE (capitals, battle sites, holy sites).
- cultures: Shared identity groups (customs, language, values). NOT political structures.
- history: Events that HAPPENED. Tag sub-type: battle/death/revolution/birth/nation-formation/tech-advancement/treaty/disaster.
- politics: Current power structures and governance.
- religion-beliefs: Faith systems, deities, doctrines, clergy.
- organizations: Groups with structure (guilds, factions, orders).
- military: Armed forces, warfare doctrine, standing armies.
- magic-technology: Systems enabling capabilities.
- geography: Physical landscape (mountains, rivers, forests, biomes).
- flora-fauna: Non-person organisms.
- economy: Trade, currency, resources.
- languages: Communication systems, scripts.
CRITICAL: ONLY extract entities EXPLICITLY named in the text. NEVER invent from general knowledge. When uncertain, EXCLUDE.
TIMELINE: If any dates or years are mentioned alongside entities, include "year" field in your response.`;
window.ASPECTS=[
{id:"characters",name:"Characters",icon:"\u{1f464}",topicPrompt:"List every named character mentioned"},
{id:"locations",name:"Locations",icon:"\u{1f3d8}\ufe0f",topicPrompt:"List every named place, city, town, village, region mentioned"},
{id:"notable-locations",name:"Notable Locations",icon:"\u{1f4cd}",topicPrompt:"List every location of narrative significance"},
{id:"cultures",name:"Cultures",icon:"\u{1f3db}\ufe0f",topicPrompt:"List every culture or civilization mentioned"},
{id:"history",name:"History",icon:"\u{1f4dc}",topicPrompt:"List every historical event mentioned. Include year if stated."},
{id:"geography",name:"Geography",icon:"\u{1f5fa}\ufe0f",topicPrompt:"List every physical landscape feature mentioned"},
{id:"politics",name:"Politics",icon:"\u2696\ufe0f",topicPrompt:"List every political entity or government mentioned"},
{id:"religion-beliefs",name:"Religion & Beliefs",icon:"\u{1f56f}\ufe0f",topicPrompt:"List every religion or faith system mentioned"},
{id:"organizations",name:"Organizations",icon:"\u{1f3f4}",topicPrompt:"List every organized group mentioned"},
{id:"military",name:"Military & Warfare",icon:"\u2694\ufe0f",topicPrompt:"List every military force mentioned"},

{id:"food-cuisine",name:"Food & Cuisine",icon:"\u{1f37d}\ufe0f",topicPrompt:"List every dish mentioned"},
{id:"fashion",name:"Fashion",icon:"\u{1f458}",topicPrompt:"List every clothing style mentioned"},

{id:"education",name:"Education",icon:"\u{1f4da}",topicPrompt:"List every school mentioned"},
{id:"healthcare",name:"Healthcare",icon:"\u{1f3e5}",topicPrompt:"List every medical practice mentioned"},
];
window.MAX_WORLDS=10;

// === Data Layer ===
window.db={
  async listWorlds(){const ks=await IDB.list("world:");const ws=[];for(const k of ks){const w=await IDB.get(k);if(w)ws.push(w);}ws.sort((a,b)=>(a.created||"").localeCompare(b.created||""));return ws;},
  async createWorld(n){const id=n.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)+'-'+Math.random().toString(36).slice(2,8);const m={id,name:n,created:new Date().toISOString(),updated:new Date().toISOString(),chatCount:0};await IDB.set("world:"+id,m);await IDB.set("bible:"+id,{world_id:id,world_name:n,last_updated:new Date().toISOString(),facts:{}});return m;},
  async saveWorld(w){w.updated=new Date().toISOString();return IDB.set("world:"+w.id,w);},
  async deleteWorld(wid){await IDB.del("world:"+wid);await IDB.del("bible:"+wid);await IDB.del("mapsvg:"+wid);await IDB.del("mappack:"+wid);const ck=await IDB.list("chat:"+wid+":");for(const k of ck)await IDB.del(k);const tk=await IDB.list("topic:"+wid+":");for(const k of tk)await IDB.del(k);},
  async getBible(wid){return(await IDB.get("bible:"+wid))||{facts:{}};},
  async saveBible(wid,b){b.last_updated=new Date().toISOString();return IDB.set("bible:"+wid,b);},
  async addFact(wid,cat,key,val){const b=await this.getBible(wid);if(!b.facts)b.facts={};if(!b.facts[cat])b.facts[cat]={};b.facts[cat][key]=val;return this.saveBible(wid,b);},
  async listChats(wid,aid){const ks=await IDB.list("chat:"+wid+":"+aid+":");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createChat(wid,aid,title){const id=Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);const ch={id,world_id:wid,aspect_id:aid,title:title||("Chat "+new Date().toLocaleString()),created:new Date().toISOString(),updated:new Date().toISOString(),messages:[]};await IDB.set("chat:"+wid+":"+aid+":"+id,ch);return ch;},
  async saveChat(c){c.updated=new Date().toISOString();return IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);},
  async loadChat(wid,aid,cid){return IDB.get("chat:"+wid+":"+aid+":"+cid);},
  async listGeneralChats(){const ks=await IDB.list("chat:__general__:__general__:");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createGeneralChat(t){return this.createChat("__general__","__general__",t);},
  async fileNote(wid,aid,text){const chats=await this.listChats(wid,aid);let tgt=chats.find(c=>c.title==="Cross-World Notes");if(tgt)tgt=await this.loadChat(wid,aid,tgt.id);if(!tgt)tgt=await this.createChat(wid,aid,"Cross-World Notes");tgt.messages.push({role:"user",content:text,timestamp:new Date().toISOString(),source:"cross-world"});await this.saveChat(tgt);},
  async gatherAspectText(wid,aid){const chats=await this.listChats(wid,aid);const ts=[];for(const ch of chats){const f=await this.loadChat(wid,aid,ch.id);if(f)for(const m of f.messages||[])ts.push(m.content||"");}return ts.join("\n\n");},
  async saveTopic(t){t.updated=new Date().toISOString();if(!t.tags)t.tags=[];if(!t.timeline)t.timeline=[];await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);return t;},
  async listTopics(wid,aid){const ks=await IDB.list("topic:"+wid+":"+aid+":");const ts=[];for(const k of ks){const t=await IDB.get(k);if(t)ts.push(t);}ts.sort((a,b)=>(a.name||"").localeCompare(b.name||""));return ts;},
  async deleteTopic(wid,aid,tid){return IDB.del("topic:"+wid+":"+aid+":"+tid);},
  async countTopics(wid,aid){return(await IDB.list("topic:"+wid+":"+aid+":")).length;},
  async saveMapSvg(wid,svg){return IDB.set("mapsvg:"+wid,svg);},
  async getMapSvg(wid){return IDB.get("mapsvg:"+wid);},
  async saveMapPack(wid,p){return IDB.set("mappack:"+wid,p);},
  async getMapPack(wid){return IDB.get("mappack:"+wid);},
  async hasMap(wid){return!!(await IDB.get("mapsvg:"+wid));},

  async exportAll(){const data={version:"worldforge-v5",exported:new Date().toISOString(),worlds:[],bibles:[],chats:[],topics:[],generalChats:[],mapData:[]};const ws=await this.listWorlds();for(const w of ws){data.worlds.push(w);data.bibles.push({wid:w.id,...(await this.getBible(w.id))});for(const asp of ASPECTS){const cs=await this.listChats(w.id,asp.id);for(const ch of cs){const f=await this.loadChat(w.id,asp.id,ch.id);if(f)data.chats.push(f);}const tps=await this.listTopics(w.id,asp.id);for(const t of tps)data.topics.push(t);}const wgc=await this.listChats(w.id,"__worldchat__");for(const ch of wgc){const f=await this.loadChat(w.id,"__worldchat__",ch.id);if(f)data.chats.push(f);}const svg=await this.getMapSvg(w.id);const pk=await this.getMapPack(w.id);if(svg||pk)data.mapData.push({wid:w.id,svg:svg||null,pack:pk||null});}const gc=await this.listGeneralChats();for(const ch of gc){const f=await this.loadChat("__general__","__general__",ch.id);if(f)data.generalChats.push(f);}return data;},
  async importAll(data){let ct={worlds:0,chats:0,topics:0};for(const w of data.worlds||[]){await IDB.set("world:"+w.id,w);ct.worlds++;}for(const b of data.bibles||[]){const wid=b.wid||b.world_id;if(wid)await IDB.set("bible:"+wid,b);}for(const c of data.chats||[]){await IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);ct.chats++;}for(const c of data.generalChats||[]){await IDB.set("chat:__general__:__general__:"+c.id,c);ct.chats++;}for(const t of data.topics||[]){await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);ct.topics++;}for(const m of data.mapData||[]){if(m.svg)await this.saveMapSvg(m.wid,m.svg);if(m.pack)await this.saveMapPack(m.wid,m.pack);}return ct;},
  async getApiKey(){return IDB.get("_apikey");},

  async importAzgaarMap(wid,fileText){
    const parsed=parseAzgaarMap(fileText);if(parsed.error)return{error:parsed.error,debug:parsed.debug};
    if(parsed.svg)await this.saveMapSvg(wid,parsed.svg);

      if(parsed.params.options?.year)w.current_year=parsed.params.options.year;

      await this.saveWorld(w);}}
    if(parsed.pack){await this.saveMapPack(wid,parsed.pack);
      const topics=generateTopicsFromPack(parsed.pack,wid,parsed.params);
      let added=0;for(const t of topics){const ex=await IDB.get("topic:"+wid+":"+t.aspect_id+":"+t.id);if(!ex){await this.saveTopic(t);added++;}else{await this.saveTopic({...ex,fields:{...(ex.fields||{}),...(t.fields||{})},tags:normTags([...(ex.tags||[]),...(t.tags||[])]),coa:t.coa||ex.coa,mfcg_url:t.mfcg_url||ex.mfcg_url,coords:t.coords||ex.coords});}}
      return{added,total:topics.length,debug:parsed.debug};}
    return{added:0,total:0,debug:parsed.debug};},
  async importJsonExport(wid,jsonText){
    let pack;try{pack=JSON.parse(jsonText);}catch(e){return{error:"Invalid JSON"};}
    if(pack.pack)pack=pack.pack;if(!pack.states&&!pack.burgs)return{error:"No states/burgs. Keys: "+Object.keys(pack).slice(0,10).join(",")};
    await this.saveMapPack(wid,pack);
    const topics=generateTopicsFromPack(pack,wid);
    let added=0;for(const t of topics){const ex=await IDB.get("topic:"+wid+":"+t.aspect_id+":"+t.id);if(!ex){await this.saveTopic(t);added++;}else{await this.saveTopic({...ex,fields:{...(ex.fields||{}),...(t.fields||{})},tags:normTags([...(ex.tags||[]),...(t.tags||[])]),coa:t.coa||ex.coa,mfcg_url:t.mfcg_url||ex.mfcg_url,coords:t.coords||ex.coords});}}
    return{added,total:topics.length};},
  async autoEnrichFromPack(wid){
    const pack=await this.getMapPack(wid);if(!pack)return{enriched:0};
    const states=safeArr(pack.states),burgs=safeArr(pack.burgs),cultures=safeArr(pack.cultures),religions=safeArr(pack.religions);
    const sN={},cN={},rN={};
    states.forEach(s=>{if(s&&s.i>0)sN[s.i]=s.name||s.fullName||"";});
    cultures.forEach(c=>{if(c&&c.i>0)cN[c.i]=c.name||"";});
    religions.forEach(r=>{if(r&&r.i>0)rN[r.i]=r.name||"";});
    let enriched=0;
    const b=await this.getBible(wid);if(!b.facts)b.facts={};
    states.forEach(s=>{if(!s||!s.i||s.i===0||s.removed)return;const name=s.fullName||s.name;if(!name)return;
      if(!b.facts['politics'])b.facts['politics']={};b.facts['politics'][name]=(s.form||"state")+", culture: "+(cN[s.culture]||"?")+", pop: "+Math.round(((s.rural||0)+(s.urban||0))*1000).toLocaleString();});
    cultures.forEach(c=>{if(!c||!c.i||c.i===0||c.removed)return;if(!b.facts['cultures'])b.facts['cultures']={};b.facts['cultures'][c.name||"Culture "+c.i]=(c.type||"")+" culture";});
    religions.forEach(r=>{if(!r||!r.i||r.i===0||r.removed)return;if(!b.facts['religions'])b.facts['religions']={};b.facts['religions'][r.name||"Religion "+r.i]=(r.form||"")+" "+(r.type||"religion")+(r.deity?" — deity: "+r.deity:"");});
    await this.saveBible(wid,b);
    const locTopics=await this.listTopics(wid,"locations");
    for(const t of locTopics){if(t.source!=="azgaar")continue;const burgId=parseInt((t.id.match(/\d+$/)||["0"])[0]);const burg=burgs[burgId];if(!burg)continue;
      const newTags=[...t.tags];if(burg.state&&sN[burg.state])newTags.push(sN[burg.state]);if(burg.culture&&cN[burg.culture])newTags.push(cN[burg.culture]);if(burg.religion&&rN[burg.religion])newTags.push(rN[burg.religion]);
      if(burg.capital)newTags.push("capital");if(burg.port)newTags.push("port");
      const merged={...t,tags:normTags(newTags)};if(merged.tags.length!==t.tags.length){await this.saveTopic(merged);enriched++;}}
    const polTopics=await this.listTopics(wid,"politics");
    for(const t of polTopics){if(t.source!=="azgaar")continue;const stateId=parseInt((t.id.match(/\d+$/)||["0"])[0]);
      const stateBurgs=burgs.filter(bg=>bg&&bg.state===stateId&&bg.name);const newTags=[...t.tags];
      stateBurgs.slice(0,10).forEach(bg=>newTags.push(bg.name));
      const s=states[stateId];if(s&&s.diplomacy){s.diplomacy.forEach((d,i)=>{if(i>0&&d&&d!=="x"&&d!=="Neutral"&&sN[i])newTags.push(sN[i]);});}
      const merged={...t,tags:normTags(newTags)};if(merged.tags.length!==t.tags.length){await this.saveTopic(merged);enriched++;}}
    return{enriched};},
};

<script type="text/babel" data-type="module">

function App(){
  const[scr,setScr]=useState("main");
  const[worlds,setWorlds]=useState([]);
  const[cW,setCW]=useState(null);
  const[cA,setCA]=useState(null);
  const[cC,setCC]=useState(null);
  const[cList,setCList]=useState([]);

  const[sheet,setSheet]=useState("");
  const[inp,setInp]=useState("");
  const[busy,setBusy]=useState(false);

  const[gen,setGen]=useState(false);
  const[worldChat,setWorldChat]=useState(false);
  const[impTxt,setImpTxt]=useState("");

  const flash=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};

  useEffect(()=>{if(scr==="chat")endRef.current?.scrollIntoView({behavior:"smooth"});},[cC?.messages?.length,scr]);

    flash("Parsing .map...");const r=await db.importAzgaarMap(cW.id,await f.text());if(r?.error)flash("Error: "+r.error);else{await db.autoEnrichFromPack(cW.id);flash((r?.added||0)+" topics imported!");setHasMapData(true);const counts={};for(const a of ASPECTS){counts[a.id]=await db.countTopics(cW.id,a.id);}setAspTopicCounts(counts);}setBusy(false);};
  const goChat=async(ch,g=false,wc=false)=>{

      sys="You are WorldForge, a creative worldbuilding assistant.\nWorld: \""+cW.name+"\" | Aspect: \""+cA.name+"\"\n\nWORLD BIBLE:\n"+(bt||"(Empty)")+"\n\nBe warm, creative, detailed. Connect ideas across aspects. If new idea contradicts Bible, warn.";

      while((m=cp.exec(resp))!==null){

        if(a){await db.fileNote(cW.id,a.id,m[2].trim());filed.push(cW.name+" > "+a.name);}
      }
      resp=resp.replace(cp,"").trim();
    }

    const aiMsg={role:"assistant",content:resp,timestamp:new Date().toISOString()};
    if(filed.length)aiMsg._filed=filed;

    const resp=await aiCall(prompt,[{role:"user",content:text.slice(0,12000)}],2048);
    try{const c=resp.trim().replace(/^```\w*\n?/,"").replace(/\n?```$/,"");const a=c.match(/\[[\s\S]*\]/);const parsed=a?JSON.parse(a[0]):[];
      setTopics(parsed);let added=0;
      for(const p of parsed){const tid="ext-"+normTag(p.name)+"-"+mkId().slice(-4);
        const existing=topicList.find(t=>t.name===p.name);
        if(!existing){await db.saveTopic({id:tid,name:p.name,brief:p.brief||"",template:TMPL_FOR[cA.id]||"culture",
          tags:normTags(p.tags||[]),hist_type:p.hist_type||"general",born_year:p.year||null,died_year:null,
          timeline:p.year?[{year:p.year,event:p.brief||p.name}]:[],fields:{},aspect_id:cA.id,world_id:cW.id,source:"extracted",
          created:new Date().toISOString(),updated:new Date().toISOString()});added++;}}
      if(added)flash(added+" topics saved");setTopicList(await db.listTopics(cW.id,cA.id));

  const saveSettings=async()=>{const k=apiKeyInput.trim();if(k){await db.setApiKey(k);setApiKey(k);setHasKey(true);}else{await db.setApiKey(null);setApiKey("");setHasKey(false);}await db.setProvider(providerSel);await db.setCustomEndpoint(customEndpoint);flash("Saved!");};

  const ALWAYS_ON=new Set(['viewbox']);

  const MAP_PRESETS={political:['ocean','lakes','landmass','coastline','rivers','borders','regions','labels','icons','markers','routes','zones','terrs'],physical:['ocean','lakes','landmass','coastline','rivers','borders','labels','icons','markers','terrs'],religious:['ocean','lakes','landmass','coastline','rivers','relig','borders','labels','icons'],cultural:['ocean','lakes','landmass','coastline','rivers','cults','borders','labels','icons'],provinces:['ocean','lakes','landmass','coastline','rivers','provs','borders','labels','icons'],biomes:['ocean','lakes','landmass','coastline','rivers','biomes','labels','icons'],military:['ocean','lakes','landmass','coastline','rivers','borders','regions','armies','labels','icons']};
  const applyMapPreset=(preset)=>{

    const groups={};
    const scan=(p,d)=>{if(d>2)return;p.querySelectorAll(':scope > g').forEach(g=>{const id=g.id;if(id&&id.length>=2)groups[id]=g;});};
    scan(svg,0);svg.querySelectorAll(':scope > g').forEach(g=>scan(g,1));
    const newLayers={};Object.entries(groups).forEach(([id,el])=>{
      const vis=show.size===0||show.has(id)||ALWAYS_ON.has(id);
      el.style.display=vis?'':'none';newLayers[id]=vis;});
    setMapLayers(newLayers);

    const el=svg.querySelector('#'+id)||svg.querySelector(':scope > g#'+id);
    if(!el){svg.querySelectorAll(':scope > g').forEach(g=>{const sub=g.querySelector('#'+id);if(sub){const vis=sub.style.display==='none';sub.style.display=vis?'':'none';setMapLayers(p=>({...p,[id]:vis}));}});}
    else{const vis=el.style.display==='none';el.style.display=vis?'':'none';setMapLayers(p=>({...p,[id]:vis}));}
  };

        if(svg){const vb=svg.getAttribute('viewBox');let sw=1920,sh=937;
          if(vb){const p=vb.split(/[\s,]+/).map(Number);if(p.length===4){sw=p[2];sh=p[3];}}
          svg.setAttribute('width',sw);svg.setAttribute('height',sh);svg.style.width=sw+'px';svg.style.height=sh+'px';
          const vbg=svg.querySelector('#viewbox');if(vbg)vbg.style.display='';
          const r=el.getBoundingClientRect(),s=Math.min(r.width/sw,r.height/sh)*0.95;
          const ox=(r.width-sw*s)/2,oy=(r.height-sh*s)/2;
          mc.style.transform='translate('+ox+'px,'+oy+'px) scale('+s+')';
          // Apply default layers
          const groups={};const scan=(p,d)=>{if(d>2)return;p.querySelectorAll(':scope > g').forEach(g=>{const id=g.id;if(id&&id.length>=2)groups[id]=g;});};
          scan(svg,0);svg.querySelectorAll(':scope > g').forEach(g=>scan(g,1));
          const initLayers={};Object.entries(groups).forEach(([id,gel])=>{
            if(ALWAYS_ON.has(id)){gel.style.display='';initLayers[id]=true;}
            else{const vis=DEFAULT_ON.has(id);gel.style.display=vis?'':'none';initLayers[id]=vis;}});
          setMapLayers(initLayers);
          // Touch pan/pinch
          let z=s,px=ox,py=oy,td=0;
          el.ontouchstart=e=>{if(e.touches.length===2){const dx=e.touches[1].clientX-e.touches[0].clientX,dy=e.touches[1].clientY-e.touches[0].clientY;td=Math.hypot(dx,dy);}};
          el.ontouchmove=e=>{e.preventDefault();
            if(e.touches.length===1){const t=e.touches[0];if(!el._lx){el._lx=t.clientX;el._ly=t.clientY;}
              px+=t.clientX-el._lx;py+=t.clientY-el._ly;el._lx=t.clientX;el._ly=t.clientY;mc.style.transform='translate('+px+'px,'+py+'px) scale('+z+')';}
            if(e.touches.length===2){const dx=e.touches[1].clientX-e.touches[0].clientX,dy=e.touches[1].clientY-e.touches[0].clientY,dist=Math.hypot(dx,dy);
              if(td){const f=dist/td,nz=Math.max(.01,Math.min(100,z*f)),cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
                const mx2=(cx-px)/z,my2=(cy-py)/z;px=cx-mx2*nz;py=cy-my2*nz;z=nz;mc.style.transform='translate('+px+'px,'+py+'px) scale('+z+')';}td=dist;}};
          el.ontouchend=()=>{el._lx=null;el._ly=null;};
          // Mouse for desktop testing
          let md=false,mx0=0,my0=0;
          el.onmousedown=e=>{md=true;mx0=e.clientX;my0=e.clientY;};
          el.onmousemove=e=>{if(!md)return;px+=e.clientX-mx0;py+=e.clientY-my0;mx0=e.clientX;my0=e.clientY;mc.style.transform='translate('+px+'px,'+py+'px) scale('+z+')';};
          el.onmouseup=()=>md=false;el.onmouseleave=()=>md=false;
          el.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.15:1/1.15;const nz=Math.max(.01,Math.min(100,z*f));
            const cx2=e.clientX-r.left,cy2=e.clientY-r.top,mx3=(cx2-px)/z,my3=(cy2-py)/z;
            px=cx2-mx3*nz;py=cy2-my3*nz;z=nz;mc.style.transform='translate('+px+'px,'+py+'px) scale('+z+')';},{passive:false});
        }}}}>
    </div>
    {/* Layer panel - slides up from bottom */}
    {showLayers&&<div style={{position:"absolute",bottom:0,left:0,right:0,maxHeight:"50%",background:T.sf,borderTop:"2px solid "+T.gold,borderRadius:"16px 16px 0 0",overflowY:"auto",zIndex:20,padding:"12px 16px 20px"}}>
      <div style={{fontSize:11,fontWeight:600,color:T.gold,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Presets</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
        {[["Political","political"],["Physical","physical"],["Religious","religious"],["Cultural","cultural"],["Provinces","provinces"],["Biomes","biomes"],["Military","military"],["Show All",null]].map(([label,key])=>
          <button key={label} onClick={()=>{if(key)applyMapPreset(key);else{const svg=document.querySelector('.map-container svg');if(svg){const g={};const sc=(p,d)=>{if(d>2)return;p.querySelectorAll(':scope > g').forEach(el=>{if(el.id&&el.id.length>=2){el.style.display='';g[el.id]=true;}});};sc(svg,0);svg.querySelectorAll(':scope > g').forEach(el=>sc(el,1));setMapLayers(g);}}}}
            style={{padding:"5px 10px",fontSize:11,background:T.bg,border:"1px solid "+T.bd,borderRadius:4,color:T.txM,cursor:"pointer"}}>{label}</button>)}
      </div>
      <div style={{fontSize:11,fontWeight:600,color:T.gold,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Layers ({Object.keys(mapLayers).filter(id=>!ALWAYS_ON.has(id)).length})</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 12px"}}>
        {Object.keys(mapLayers).filter(id=>!ALWAYS_ON.has(id)).sort().map(id=>(
          <label key={id} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",cursor:"pointer",fontSize:12,color:mapLayers[id]?T.txM:T.txD}}>
            <input type="checkbox" checked={!!mapLayers[id]} onChange={()=>toggleMapLayer(id)} style={{accentColor:T.gold,width:14,height:14}}/>
            <span>{id}</span>
          </label>))}
      </div>
    </div>}
  </>);

  if(scr==="general")return S(<>
    <Hdr title="General Chat" subtitle="Freeform worldbuilding" onBack={goMain}
      right={<Btn sm onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWorldChat(false);setScr("chat");}}>+ New</Btn>}/>
    {cList.length===0
      ?<div style={{padding:"60px 32px",textAlign:"center"}}><div style={{fontSize:48,marginBottom:16,opacity:.4}}>💬</div>
        <div style={{color:T.txD,fontSize:14,marginBottom:20}}>No general chats yet</div>
        <Btn onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWorldChat(false);setScr("chat");}}>New Chat</Btn></div>
      :cList.map(c=><Row key={c.id} icon="💬" label={c.title} detail={new Date(c.updated).toLocaleDateString()+" · "+(c.messages?.length||0)+" msgs"} onClick={()=>goChat(c,true)}/>)}
  </>);

  if(scr==="chat"&&cC)return S(
    <React.Fragment>
      <Hdr title={gen?"General Chat":(worldChat?"World Chat":(cA?.name||"Chat"))}
        subtitle={gen?cC.title:((cW?.name||"")+(worldChat?"":" · "+(cA?.name||"")))}
        onBack={()=>{setScr(gen?"general":(worldChat?"worldchatlist":"aspect"));setCC(null);}}
        right={<div style={{display:"flex",gap:2}}>
          {!gen&&<Btn sm v="g" onClick={openFact} style={{fontSize:16,padding:"4px 8px"}}>📝</Btn>}
          <Btn sm v="g" onClick={openNote} style={{fontSize:16,padding:"4px 8px"}}>↗</Btn>
          {!gen&&<Btn sm v="g" onClick={openBible} style={{fontSize:16,padding:"4px 8px"}}>📖</Btn>}
        </div>}/>
      <div style={{flex:1,overflowY:"auto",padding:"12px 0"}}>
        {(!cC.messages||cC.messages.length===0)&&<div style={{padding:"40px 24px",textAlign:"center",color:T.txD,fontSize:13}}>
          {gen?"Type anything. Mention a world to auto-file notes.":(worldChat?"Discuss anything about "+cW.name+". Topics auto-file to the right aspect.":"Start worldbuilding!")}</div>}
        {(cC.messages||[]).map((m,i)=><Bub key={i} msg={m}/>)}
        {busy&&<div style={{padding:"12px 20px",color:T.goldD,fontSize:13,fontStyle:"italic"}}>Forging response...</div>}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"8px 12px 16px",borderTop:"1px solid "+T.bd,background:T.sf,display:"flex",gap:8,alignItems:"flex-end",flexShrink:0}}>
        <textarea value={inp} onChange={e=>setInp(e.target.value)} placeholder="Type your message..."
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          rows={1} style={{flex:1,resize:"none",padding:"10px 14px",borderRadius:12,border:"1px solid "+T.bd,
            background:T.bg,color:T.tx,fontSize:14,fontFamily:"inherit",outline:"none",maxHeight:120,lineHeight:1.4}}
          onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}/>
        <button onClick={send} disabled={busy||!inp.trim()} style={{background:T.gold,border:"none",borderRadius:12,width:44,height:44,
          cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          opacity:busy||!inp.trim()?0.4:1,fontSize:18,flexShrink:0,color:T.bg,fontWeight:700}}>↑</button>
      </div>
    </React.Fragment>
  );

  if(scr==="settings")return S(<div style={{flex:1,overflowY:"auto"}}>
    <Hdr title="Settings" onBack={goMain}/>
    <div style={{padding:"20px 20px 0"}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>API Key</div>
      <div style={{fontSize:12,color:T.txD,marginBottom:10,lineHeight:1.5}}>Required for AI features. Get yours at console.anthropic.com</div>
      <input type="text" autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} onInput={e=>setApiKeyInput(e.target.value)} onPaste={e=>{setTimeout(()=>setApiKeyInput(e.target.value),0);}} placeholder="sk-ant-api03-..." style={{...iS,fontFamily:"monospace",fontSize:13,WebkitTextSecurity:"disc"}}/>
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <Btn full onClick={saveSettings}>{hasKey?"Update":"Save Key"}</Btn>
        {hasKey&&<Btn v="s" onClick={async()=>{setApiKeyInput("");await db.setApiKey(null);setApiKey("");setHasKey(false);flash("Key removed");}}>Remove</Btn>}
      </div>
      <div style={{fontSize:11,color:T.txD,marginTop:8}}>{hasKey?"✅ Key saved":"⚠️ No key"}</div>
    </div>
    <div style={{margin:"16px 20px 0",borderTop:"1px solid "+T.bd,paddingTop:16}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Provider</div>
      <select value={providerSel} onChange={e=>setProviderSel(e.target.value)} style={{...iS,maxWidth:300,marginBottom:8}}>
        <option value="claude">Claude (Anthropic)</option><option value="deepseek">DeepSeek</option><option value="custom">Custom</option>
      </select>
      {providerSel==="custom"&&<input value={customEndpoint} onChange={e=>setCustomEndpoint(e.target.value)} placeholder="https://..." style={{...iS,marginBottom:8}}/>}
      <Btn full v="s" onClick={saveSettings}>Save Provider</Btn>
    </div>
    <div style={{margin:"16px 20px 0",borderTop:"1px solid "+T.bd,paddingTop:16}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Data</div>
    </div>
    <Row icon="📤" label="Export All Data" detail="Download JSON for desktop sync" onClick={doExport}/>
    <Row icon="📥" label="Import Data" detail="Load JSON from desktop" onClick={()=>setScr("import")}/>
    <Row icon="🗑️" label="Delete All Data" detail="Cannot be undone" danger onClick={()=>setMod({t:"delAll"})}/>
    <div style={{padding:"24px 20px"}}><div style={{fontSize:11,color:T.txD,lineHeight:1.6}}>WorldForge Mobile v3{"\n"}AI: {providerSel}{"\n"}Storage: IndexedDB (local){"\n"}Export format v5</div></div>
  </div>);

  if(scr==="import")return S(<>
    <Hdr title="Import Data" onBack={()=>setScr("settings")}/>
    <div style={{padding:20}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Upload File</div>
      <label style={{display:"block",width:"100%",padding:"16px 20px",borderRadius:8,background:T.sf,border:"1px solid "+T.bd,color:T.tx,fontSize:14,textAlign:"center",cursor:"pointer",marginBottom:16}}>
        📂 Choose worldforge-export.json
        <input type="file" accept=".json,application/json" style={{display:"none"}} onChange={async e=>{
          const f=e.target.files[0];if(!f)return;try{const txt=await f.text();const d=JSON.parse(txt);const c=await db.importAll(d);flash("Imported "+c.worlds+"w "+c.chats+"c "+c.topics+"t");await ldW();setScr("settings");}catch(err){flash("Invalid JSON file");}
        }}/>
      </label>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Or Paste JSON</div>
      <textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} placeholder="Paste JSON here..." rows={8}
        style={{width:"100%",resize:"vertical",padding:14,borderRadius:8,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:13,fontFamily:"monospace",outline:"none",lineHeight:1.5}}/>
      <div style={{display:"flex",gap:8,marginTop:12}}><Btn full onClick={doImport}>Import Text</Btn><Btn v="s" onClick={()=>{setImpTxt("");setScr("settings");}}>Cancel</Btn></div>
    </div>
  </>);

  return S(<div style={{padding:40,textAlign:"center",color:T.txD}}>Loading...</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
